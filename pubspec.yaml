name: elan_flutterproject
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.4 <3.5.5"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_dotenv: ^6.0.0
  firebase_core: ^4.7.0
  firebase_app_check: ^0.4.3
  firebase_auth: ^6.4.0
  firebase_auth_platform_interface: ^8.1.9
  flutter_plugin_android_lifecycle: 2.0.24
  cloud_firestore: ^6.3.0
  file_saver: ^0.2.14
  firebase_messaging: ^16.2.0
  firebase_storage: ^13.3.0
  get_it: ^9.2.1
  google_fonts: ^6.3.0
  page_transition: ^2.2.1
  provider: ^6.1.5+1
  auto_size_text: ^3.0.0
  font_awesome_flutter: 10.8.0
  collection: ^1.18.0
  from_css_color: ^2.0.0
  intl: ^0.19.0
  json_path: ^0.7.6
  timeago: ^3.7.1
  url_launcher: ^6.3.1
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  sign_in_with_apple: ^7.0.1
  rxdart: ^0.28.0
  google_sign_in: ^6.2.2
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.1.0
  pdf: ^3.11.3
  printing: ^5.14.3

  http: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  firebase_auth_mocks: ^0.15.1
  firebase_storage_mocks: ^0.8.0+1
  fake_cloud_firestore: ^4.1.0+1

dependency_overrides:
  clock: ^1.1.2
  meta: ^1.18.2

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/logo.png
    - assets/images/person_icon.png
    - assets/data/business_industry.json
    - assets/data/influencer_content_type.json
    - assets/data/saudi_companies_top50.json
    - assets/data/social_platforms.json
    - assets/svg/
    - assets/fonts/NotoSansArabic-Regular.ttf
    - assets/fonts/NotoSansArabic-Bold.ttf
